<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AnalyseUPSC – European Powers & Foreign Travellers</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* CSS Variables – will be overridden by theme from localStorage */
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --primary: #3b82f6;
            --primary-hover: #60a5fa;
            --card-border: #334155;
            --hover-bg: #334155;
            --correct-bg: #bbf7d0;
            --correct-border: #15803d;
            --wrong-bg: #fee2e2;
            --wrong-border: #b91c1c;
            --analysis-bg: #f1f5f9;
            --analysis-border: #3b82f6;
            --palette-bg: #f1f5f9;
            --timer-bg: #0f172a;
            --transition: all 0.2s ease;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: var(--transition);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--surface);
            border-radius: 28px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: var(--surface);
            color: var(--text);
            padding: 20px 24px;
            border-bottom: 1px solid var(--card-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.4rem;
        }

        .header p {
            color: var(--text-light);
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .header-controls {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .home-link {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .home-link:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        /* Timer controls */
        .timer-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--hover-bg);
            padding: 5px 15px;
            border-radius: 40px;
        }

        .timer-controls label {
            font-size: 0.8rem;
            cursor: pointer;
        }

        .timer-controls input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .timer-select {
            background: var(--timer-bg);
            color: var(--text);
            border: none;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .timer-display {
            background: var(--timer-bg);
            padding: 6px 12px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 1rem;
            font-weight: 600;
            display: none;
        }

        .timer-display.active {
            display: block;
        }

        .timer-warning {
            color: #f97316;
            animation: pulse 0.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .quiz-area {
            padding: 24px;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
            color: var(--text);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            background: var(--surface);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            color: var(--text);
        }

        .option:hover {
            background: var(--hover-bg);
            transform: translateX(4px);
        }

        .option.correct-highlight {
            background: var(--correct-bg);
            border-color: var(--correct-border);
            color: #0f172a;
        }

        .option.wrong-highlight {
            background: var(--wrong-bg);
            border-color: var(--wrong-border);
            color: #0f172a;
        }

        .analysis {
            margin-top: 20px;
            padding: 16px;
            background: var(--analysis-bg);
            border-radius: 16px;
            border-left: 4px solid var(--analysis-border);
            display: none;
            color: #0f172a;
        }

        .analysis.show {
            display: block;
        }

        .analysis h4 {
            margin-bottom: 12px;
            color: #1e293b;
            font-size: 1rem;
        }

        .analysis .option-analysis {
            margin: 10px 0;
            padding-left: 16px;
            border-left: 2px solid #cbd5e1;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background: var(--text-light);
            cursor: not-allowed;
            transform: none;
        }

        .question-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
            background: var(--palette-bg);
            padding: 12px;
            border-radius: 20px;
        }

        .palette-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            color: var(--text);
        }

        .palette-item:hover {
            background: var(--hover-bg);
        }

        .palette-item.current {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .palette-item.answered {
            background: var(--correct-bg);
            border-color: var(--correct-border);
            color: #0f172a;
        }

        .palette-item.unanswered-timer {
            background: var(--wrong-bg);
            border-color: var(--wrong-border);
            color: #0f172a;
        }

        .progress {
            font-size: 0.85rem;
            color: var(--text-light);
        }

        /* Results modal */
        .results-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .results-modal {
            background: var(--surface);
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 24px;
            padding: 24px;
            color: var(--text);
        }

        .results-modal h2 {
            margin-bottom: 20px;
            color: var(--text);
        }

        .score-card {
            background: var(--hover-bg);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: center;
        }

        .score-number {
            font-size: 2rem;
            font-weight: bold;
            color: var(--primary);
        }

        .result-analysis {
            margin: 15px 0;
            padding: 10px;
            border-bottom: 1px solid var(--card-border);
        }

        .close-results {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            .container {
                margin: 0;
                border-radius: 20px;
            }
            .question-text {
                font-size: 1.1rem;
            }
            .palette-item {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div>
            <h1>🌍 European Powers & Foreign Travellers</h1>
            <p>Portuguese, Dutch, French, British – Conflicts, Travellers, and Settlements | 10 PYQs</p>
        </div>
        <div class="header-controls">
            <div class="timer-controls">
                <label>⏱️ Set Timer</label>
                <input type="checkbox" id="timerToggle">
                <select id="timerDuration" class="timer-select" disabled>
                    <option value="5">5 min</option>
                    <option value="10">10 min</option>
                    <option value="15" selected>15 min</option>
                    <option value="20">20 min</option>
                    <option value="25">25 min</option>
                </select>
            </div>
            <div class="timer-display" id="timerDisplay">00:00</div>
            <a href="index.html" class="home-link">🏠 Back to Home</a>
        </div>
    </div>

    <div class="quiz-area" id="quizArea">
        <div class="question-text" id="questionText">Loading...</div>
        <div class="options" id="optionsContainer"></div>
        <div class="analysis" id="analysisContainer">
            <h4>📖 Detailed Analysis</h4>
            <div id="analysisContent"></div>
        </div>
        <div class="question-palette" id="paletteContainer"></div>
        <div class="navigation">
            <div class="nav-buttons">
                <button id="prevBtn" disabled>← Previous</button>
                <button id="nextBtn">Next →</button>
            </div>
            <div class="progress">Question <span id="currentIdxDisplay">1</span> / <span id="totalQDisplay">10</span></div>
        </div>
    </div>
</div>

<!-- Results Modal -->
<div id="resultsModal" class="results-overlay">
    <div class="results-modal">
        <h2>📊 Quiz Results</h2>
        <div id="resultsContent"></div>
        <button class="close-results" onclick="closeResults()">Close</button>
    </div>
</div>

<script>
    // ========== THEME SYNCHRONIZATION ==========
    // Load theme from localStorage (set by homepage)
    function loadTheme() {
        const savedTheme = localStorage.getItem('upsc_theme');
        if (!savedTheme) return;
        
        // Theme definitions (same as homepage)
        const themes = {
            'dark-default': {
                '--bg': '#0f172a', '--surface': '#1e293b', '--text': '#f1f5f9', '--text-light': '#94a3b8',
                '--primary': '#3b82f6', '--primary-hover': '#60a5fa', '--card-border': '#334155', '--hover-bg': '#334155',
                '--correct-bg': '#bbf7d0', '--correct-border': '#15803d', '--wrong-bg': '#fee2e2', '--wrong-border': '#b91c1c',
                '--analysis-bg': '#f1f5f9', '--analysis-border': '#3b82f6', '--palette-bg': '#f1f5f9', '--timer-bg': '#0f172a'
            },
            'dark-blue': {
                '--bg': '#0c1a2f', '--surface': '#13294b', '--text': '#e8f0fe', '--text-light': '#9bb8e0',
                '--primary': '#1e88e5', '--primary-hover': '#42a5f5', '--card-border': '#1e3a8a', '--hover-bg': '#1e3a8a',
                '--correct-bg': '#bbf7d0', '--correct-border': '#15803d', '--wrong-bg': '#fee2e2', '--wrong-border': '#b91c1c',
                '--analysis-bg': '#e6f0ff', '--analysis-border': '#1e88e5', '--palette-bg': '#e6f0ff', '--timer-bg': '#0c1a2f'
            },
            'dark-green': {
                '--bg': '#0f2c1a', '--surface': '#1a3a2a', '--text': '#e8f5e9', '--text-light': '#a5d6a7',
                '--primary': '#2e7d32', '--primary-hover': '#43a047', '--card-border': '#2e7d32', '--hover-bg': '#2e7d32',
                '--correct-bg': '#bbf7d0', '--correct-border': '#15803d', '--wrong-bg': '#fee2e2', '--wrong-border': '#b91c1c',
                '--analysis-bg': '#e8f5e9', '--analysis-border': '#2e7d32', '--palette-bg': '#e8f5e9', '--timer-bg': '#0f2c1a'
            },
            'dark-purple': {
                '--bg': '#1a1035', '--surface': '#2c1e4a', '--text': '#f3e8ff', '--text-light': '#c4b5fd',
                '--primary': '#8b5cf6', '--primary-hover': '#a78bfa', '--card-border': '#5b21b6', '--hover-bg': '#5b21b6',
                '--correct-bg': '#bbf7d0', '--correct-border': '#15803d', '--wrong-bg': '#fee2e2', '--wrong-border': '#b91c1c',
                '--analysis-bg': '#f3e8ff', '--analysis-border': '#8b5cf6', '--palette-bg': '#f3e8ff', '--timer-bg': '#1a1035'
            },
            'dark-amber': {
                '--bg': '#2c1a0f', '--surface': '#3e2a1f', '--text': '#fff3e0', '--text-light': '#ffcc80',
                '--primary': '#f59e0b', '--primary-hover': '#fbbf24', '--card-border': '#b45309', '--hover-bg': '#b45309',
                '--correct-bg': '#bbf7d0', '--correct-border': '#15803d', '--wrong-bg': '#fee2e2', '--wrong-border': '#b91c1c',
                '--analysis-bg': '#fff3e0', '--analysis-border': '#f59e0b', '--palette-bg': '#fff3e0', '--timer-bg': '#2c1a0f'
            },
            'light-modern': {
                '--bg': '#f8fafc', '--surface': '#ffffff', '--text': '#0f172a', '--text-light': '#475569',
                '--primary': '#2563eb', '--primary-hover': '#3b82f6', '--card-border': '#e2e8f0', '--hover-bg': '#f1f5f9',
                '--correct-bg': '#bbf7d0', '--correct-border': '#15803d', '--wrong-bg': '#fee2e2', '--wrong-border': '#b91c1c',
                '--analysis-bg': '#f1f5f9', '--analysis-border': '#2563eb', '--palette-bg': '#f1f5f9', '--timer-bg': '#ffffff'
            },
            'light-warm': {
                '--bg': '#fff7ed', '--surface': '#ffffff', '--text': '#2d1a0f', '--text-light': '#92400e',
                '--primary': '#ea580c', '--primary-hover': '#f97316', '--card-border': '#fed7aa', '--hover-bg': '#ffedd5',
                '--correct-bg': '#bbf7d0', '--correct-border': '#15803d', '--wrong-bg': '#fee2e2', '--wrong-border': '#b91c1c',
                '--analysis-bg': '#ffedd5', '--analysis-border': '#ea580c', '--palette-bg': '#ffedd5', '--timer-bg': '#ffffff'
            },
            'forest': {
                '--bg': '#14532d', '--surface': '#166534', '--text': '#fefce8', '--text-light': '#bef264',
                '--primary': '#4ade80', '--primary-hover': '#86efac', '--card-border': '#15803d', '--hover-bg': '#15803d',
                '--correct-bg': '#bbf7d0', '--correct-border': '#15803d', '--wrong-bg': '#fee2e2', '--wrong-border': '#b91c1c',
                '--analysis-bg': '#dcfce7', '--analysis-border': '#4ade80', '--palette-bg': '#dcfce7', '--timer-bg': '#14532d'
            },
            'ocean': {
                '--bg': '#0c4a6e', '--surface': '#075985', '--text': '#f0f9ff', '--text-light': '#bae6fd',
                '--primary': '#38bdf8', '--primary-hover': '#7dd3fc', '--card-border': '#0284c7', '--hover-bg': '#0284c7',
                '--correct-bg': '#bbf7d0', '--correct-border': '#15803d', '--wrong-bg': '#fee2e2', '--wrong-border': '#b91c1c',
                '--analysis-bg': '#e0f2fe', '--analysis-border': '#38bdf8', '--palette-bg': '#e0f2fe', '--timer-bg': '#0c4a6e'
            },
            'sunset': {
                '--bg': '#831843', '--surface': '#9d174d', '--text': '#fdf4ff', '--text-light': '#f5d0fe',
                '--primary': '#f43f5e', '--primary-hover': '#fb7185', '--card-border': '#be185d', '--hover-bg': '#be185d',
                '--correct-bg': '#bbf7d0', '--correct-border': '#15803d', '--wrong-bg': '#fee2e2', '--wrong-border': '#b91c1c',
                '--analysis-bg': '#fce7f3', '--analysis-border': '#f43f5e', '--palette-bg': '#fce7f3', '--timer-bg': '#831843'
            }
        };
        
        const theme = themes[savedTheme];
        if (theme) {
            const root = document.documentElement;
            for (let [prop, val] of Object.entries(theme)) {
                root.style.setProperty(prop, val);
            }
        }
    }
    
    // Apply theme on load
    loadTheme();

    // ========== SET 4: EUROPEAN POWERS & FOREIGN TRAVELLERS ==========
    const questions = [
        {
            id: 1,
            text: "Hooghly was used as a base for piracy in the Bay of Bengal by:",
            options: ["the Portuguese", "the French", "the Danish", "the British"],
            correct: 0,
            analysis: {
                options: [
                    "✓ The Portuguese established a trading post at Hooghly in 1537. By the late 16th century, they began indulging in piracy, attacking ships in the Bay of Bengal. Their presence angered the Mughal emperor Shah Jahan, who expelled them in 1632 after a siege. This episode is significant in understanding early European conflicts with Mughal authority.",
                    "✗ The French East India Company was established in 1664 and later set up a factory at Chandernagore near Hooghly. Their activities were primarily commercial and diplomatic; no record of piracy.",
                    "✗ The Danish East India Company had a settlement at Serampore (Frederiksnagore) north of Calcutta from 1755. They were primarily traders and missionaries.",
                    "✗ The British East India Company established its first factory at Hooghly in 1651 but shifted to Calcutta in 1690. They focused on trade and later political control."
                ]
            }
        },
        {
            id: 2,
            text: "Who among the following was the first European to initiate the policy of taking part in the quarrels of Indian princes with a view to acquire territories?",
            options: ["Clive", "Dupleix", "Albuquerque", "Warren Hastings"],
            correct: 1,
            analysis: {
                options: [
                    "✗ Clive (1725–1774) intervened in Bengal (Plassey 1757), but the policy was pioneered earlier by the French.",
                    "✓ Joseph François Dupleix (1697–1763), French Governor-General of Pondicherry, was the first to systematically intervene in Indian princely quarrels. In the Carnatic Wars (1746–1763), he supported rival claimants to extend French influence and acquire territories.",
                    "✗ Afonso de Albuquerque (1453–1515) conquered Goa and established Portuguese naval supremacy, using direct conquest, not succession intervention.",
                    "✗ Warren Hastings (1732–1818) consolidated British power after Clive, following established policies."
                ]
            }
        },
        {
            id: 3,
            text: "With reference to the entry of European powers into India, which one of the following statements is not correct?",
            options: ["The Portuguese captured Goa in 1499.", "The English opened their first factory in South India at Masulipatam.", "In Eastern India, the English Company opened its first factory in Orissa in 1633.", "Under the leadership of Dupleix, the French occupied Madras in 1746."],
            correct: 0,
            analysis: {
                options: [
                    "✗ This is the INCORRECT statement. Goa was captured by Afonso de Albuquerque in 1510, not 1499. Vasco da Gama arrived in India in 1498.",
                    "✓ The English East India Company established its first factory in South India at Masulipatam (Machilipatnam) in 1611. (Correct)",
                    "✓ The English established a factory at Hariharpur (Balasore) in Orissa in 1633. (Correct)",
                    "✓ During the First Carnatic War, the French under Dupleix captured Madras in 1746. (Correct)"
                ]
            }
        },
        {
            id: 4,
            text: "In India, among the following locations, the Dutch established their earliest factory at:",
            options: ["Surat", "Pulicat", "Cochin", "Cassimbazar"],
            correct: 1,
            analysis: {
                options: [
                    "✗ The Dutch had a factory at Surat (Gujarat) from 1616, but this was not their earliest in India.",
                    "✓ The Dutch established their first factory in India at Pulicat (Pazhaverkadu, Tamil Nadu) in 1610. It became the headquarters of Dutch Coromandel.",
                    "✗ The Dutch captured Cochin from the Portuguese in 1663, which became a major settlement, but not their earliest.",
                    "✗ The Dutch had a factory at Cossimbazar (Murshidabad) from around 1630–40, later than Pulicat."
                ]
            }
        },
        {
            id: 5,
            text: "Which one of the following is the correct statement?",
            options: ["The modern Kochi was a Dutch colony till India's independence.", "The Dutch defeated the Portuguese and built Fort Williams in the modern Kochi.", "The modern Kochi was first a Dutch colony before the Portuguese took over.", "The modern Kochi never became a part of a British colony."],
            correct: 3,
            analysis: {
                options: [
                    "✗ Cochin was Portuguese (1503–1663), then Dutch (1663–1795), then British (1795–1947). It was not Dutch till independence.",
                    "✗ The Dutch defeated the Portuguese in 1663 and took over Fort Emmanuel; Fort William was built by the British in Calcutta (1696).",
                    "✗ Portuguese were the first European power in Kochi (1503); they were followed by the Dutch.",
                    "✓ Kochi was under British control from 1795 but remained a princely state under British suzerainty, not directly administered as a colony. Hence correct."
                ]
            }
        },
        {
            id: 6,
            text: "Who among the following Europeans were the last to come to pre-independence India as traders?",
            options: ["Dutch", "English", "French", "Portuguese"],
            correct: 2,
            analysis: {
                options: [
                    "✗ The Dutch East India Company arrived in India in 1605.",
                    "✗ The English East India Company arrived in 1608–1611.",
                    "✓ The French East India Company was founded in 1664, and they established their first factory at Surat in 1668. Among major European powers, the French were the last to arrive.",
                    "✗ The Portuguese arrived in 1498, the earliest."
                ]
            }
        },
        {
            id: 7,
            text: "Which one of the following was the first fort constructed by the British in India?",
            options: ["Fort William", "Fort St George", "Fort St David", "Fort St Angelo"],
            correct: 1,
            analysis: {
                options: [
                    "✗ Fort William was built in Calcutta in 1696 (original) and rebuilt after 1756.",
                    "✓ Fort St George was built by the British in Madras (Chennai) in 1644. It became the headquarters of the English East India Company on the Coromandel coast.",
                    "✗ Fort St David was built later (c. 1687) near Cuddalore.",
                    "✗ Fort St Angelo was built by the Portuguese at Cannanore; the British captured it later."
                ]
            }
        },
        {
            id: 8,
            text: "With reference to Pondicherry (now Puducherry), consider the following statements: 1. The first European power to occupy Pondicherry were the Portuguese. 2. The second European power to occupy Pondicherry were the French. 3. The English never occupied Pondicherry.",
            options: ["1 only", "2 and 3 only", "3 only", "1, 2 and 3"],
            correct: 0,
            analysis: {
                options: [
                    "✓ Statement 1 is true (Portuguese had a settlement 1521–1613). Statement 2 is false (Dutch occupied 1693–1699 before French). Statement 3 is false (British occupied multiple times during Carnatic and Napoleonic Wars).",
                    "✗ Statement 2 and 3 are both false.",
                    "✗ Statement 3 is false.",
                    "✗ All statements are not true."
                ]
            }
        },
        {
            id: 9,
            text: "Which one of the following foreign travellers elaborately discussed about diamonds and diamond mines of India?",
            options: ["Francois Bernier", "Jean-Baptiste Tavernier", "Jean de Thevenot", "Abbe Barthelemy Carre"],
            correct: 1,
            analysis: {
                options: [
                    "✗ Francois Bernier (1656–1668) wrote about Mughal India, society, and politics, but not extensively about diamond mines.",
                    "✓ Jean-Baptiste Tavernier (1605–1689), a French gem merchant, travelled to India six times. His book 'Six Voyages' provides detailed accounts of diamond mines (especially Golconda) and the Koh-i-Noor diamond.",
                    "✗ Jean de Thevenot (1633–1667) wrote about his journeys in the Middle East and India but was not focused on diamonds.",
                    "✗ Abbe Barthelemy Carre visited India in the 17th century, but his writings lack depth on diamond mines."
                ]
            }
        },
        {
            id: 10,
            text: "Which one of the following mountain tribes did the British first come into contact after the grant of Diwani in the year 1765?",
            options: ["Garos", "Khasis", "Kukis", "Tipparehs"],
            correct: 1,
            analysis: {
                options: [
                    "✗ The Garos lived in Garo Hills (Meghalaya); British contact came later in the 19th century.",
                    "✓ After the grant of Diwani (1765), the British inherited administration of Bengal, including the Khasi Hills region. Early contacts occurred in the 1770s–80s due to trade routes, culminating in the Anglo‑Khasi War (1829–1833).",
                    "✗ The Kukis inhabited hills of Manipur, Mizoram; contact intensified in the 19th century.",
                    "✗ Tipperah (Tripura) was a princely state; sustained British engagement came later."
                ]
            }
        }
    ];

    // ========== APP STATE ==========
    let currentIndex = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let answerLock = false;
    
    // Timer variables
    let timerEnabled = false;
    let timerInterval = null;
    let totalTimeSeconds = 15 * 60;
    let timeRemaining = totalTimeSeconds;
    let quizSubmitted = false;

    const MARK_CORRECT = 2;
    const MARK_INCORRECT = -0.67;

    // DOM elements
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const analysisContainer = document.getElementById('analysisContainer');
    const analysisContent = document.getElementById('analysisContent');
    const paletteContainer = document.getElementById('paletteContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const currentIdxDisplay = document.getElementById('currentIdxDisplay');
    const totalQDisplay = document.getElementById('totalQDisplay');
    const timerToggle = document.getElementById('timerToggle');
    const timerDurationSelect = document.getElementById('timerDuration');
    const timerDisplay = document.getElementById('timerDisplay');
    const resultsModal = document.getElementById('resultsModal');

    totalQDisplay.textContent = questions.length;

    // Timer functions
    function updateTimerDisplay() {
        const minutes = Math.floor(timeRemaining / 60);
        const seconds = timeRemaining % 60;
        timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        if (timeRemaining <= 60) {
            timerDisplay.classList.add('timer-warning');
        } else {
            timerDisplay.classList.remove('timer-warning');
        }
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerDisplay.classList.add('active');
        timerInterval = setInterval(() => {
            if (!timerEnabled || quizSubmitted) return;
            if (timeRemaining <= 1) {
                clearInterval(timerInterval);
                timerInterval = null;
                submitQuizByTimer();
            } else {
                timeRemaining--;
                updateTimerDisplay();
            }
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
        timerDisplay.classList.remove('active');
    }

    function submitQuizByTimer() {
        if (quizSubmitted) return;
        quizSubmitted = true;
        stopTimer();
        
        for (let i = 0; i < questions.length; i++) {
            if (userAnswers[i] === null) {
                userAnswers[i] = -1;
            }
        }
        
        let totalScore = 0;
        let correctCount = 0;
        let incorrectCount = 0;
        let unattemptedCount = 0;
        
        for (let i = 0; i < questions.length; i++) {
            const answer = userAnswers[i];
            const isCorrect = (answer === questions[i].correct);
            
            if (answer === null || answer === -1) {
                unattemptedCount++;
            } else if (isCorrect) {
                correctCount++;
                totalScore += MARK_CORRECT;
            } else {
                incorrectCount++;
                totalScore += MARK_INCORRECT;
            }
        }
        
        let resultsHtml = `
            <div class="score-card">
                <div class="score-number">${totalScore.toFixed(2)} / ${questions.length * MARK_CORRECT}</div>
                <div>Correct: ${correctCount} (+2 each) | Incorrect: ${incorrectCount} (-0.67 each) | Unattempted: ${unattemptedCount}</div>
            </div>
            <h3>Question-wise Analysis</h3>
        `;
        
        for (let i = 0; i < questions.length; i++) {
            const q = questions[i];
            const answer = userAnswers[i];
            const isCorrect = (answer === q.correct);
            let status = '';
            let statusColor = '';
            
            if (answer === null || answer === -1) {
                status = '❌ Not Attempted';
                statusColor = '#f97316';
            } else if (isCorrect) {
                status = '✅ Correct (+2)';
                statusColor = '#15803d';
            } else {
                status = '❌ Incorrect (-0.67)';
                statusColor = '#b91c1c';
            }
            
            resultsHtml += `
                <div class="result-analysis">
                    <strong>Q${i+1}. ${q.text}</strong><br>
                    <span style="color: ${statusColor}">${status}</span><br>
                    <small>Correct answer: ${String.fromCharCode(65+q.correct)}. ${q.options[q.correct]}</small><br>
                    <small>${q.analysis.options[q.correct]}</small>
                </div>
            `;
        }
        
        document.getElementById('resultsContent').innerHTML = resultsHtml;
        resultsModal.style.display = 'flex';
        
        answerLock = true;
        document.querySelectorAll('.option').forEach(opt => {
            opt.style.pointerEvents = 'none';
        });
        prevBtn.disabled = true;
        nextBtn.disabled = true;
    }

    function closeResults() {
        resultsModal.style.display = 'none';
    }
    window.closeResults = closeResults;

    timerToggle.addEventListener('change', (e) => {
        timerEnabled = e.target.checked;
        timerDurationSelect.disabled = !timerEnabled;
        
        if (timerEnabled) {
            const selectedMinutes = parseInt(timerDurationSelect.value);
            totalTimeSeconds = selectedMinutes * 60;
            timeRemaining = totalTimeSeconds;
            updateTimerDisplay();
            startTimer();
        } else {
            stopTimer();
        }
    });

    timerDurationSelect.addEventListener('change', () => {
        if (timerEnabled) {
            const selectedMinutes = parseInt(timerDurationSelect.value);
            totalTimeSeconds = selectedMinutes * 60;
            timeRemaining = totalTimeSeconds;
            updateTimerDisplay();
            if (timerInterval) {
                clearInterval(timerInterval);
                startTimer();
            }
        }
    });

    function renderCurrentQuestion() {
        if (quizSubmitted) return;
        const q = questions[currentIndex];
        questionText.textContent = q.text;
        
        optionsContainer.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const optDiv = document.createElement('div');
            optDiv.className = 'option';
            optDiv.textContent = `${String.fromCharCode(65+idx)}. ${opt}`;
            optDiv.setAttribute('data-idx', idx);
            optDiv.addEventListener('click', () => handleOptionClick(idx));
            optionsContainer.appendChild(optDiv);
        });
        
        if (userAnswers[currentIndex] !== null && userAnswers[currentIndex] !== -1) {
            const selectedIdx = userAnswers[currentIndex];
            const correctIdx = q.correct;
            const optionDivs = document.querySelectorAll('.option');
            optionDivs[correctIdx].classList.add('correct-highlight');
            if (selectedIdx !== correctIdx) {
                optionDivs[selectedIdx].classList.add('wrong-highlight');
            }
            showAnalysis(q, selectedIdx);
        } else {
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct-highlight', 'wrong-highlight'));
            analysisContainer.classList.remove('show');
        }
    }

    function handleOptionClick(selectedIdx) {
        if (answerLock || quizSubmitted) return;
        if (userAnswers[currentIndex] !== null && userAnswers[currentIndex] !== -1) return;
        
        const q = questions[currentIndex];
        const correctIdx = q.correct;
        
        userAnswers[currentIndex] = selectedIdx;
        
        const optionDivs = document.querySelectorAll('.option');
        optionDivs[correctIdx].classList.add('correct-highlight');
        if (selectedIdx !== correctIdx) {
            optionDivs[selectedIdx].classList.add('wrong-highlight');
        }
        
        showAnalysis(q, selectedIdx);
        renderPalette();
        answerLock = true;
    }

    function showAnalysis(q, selectedIdx) {
        const analysis = q.analysis;
        if (!analysis || !analysis.options) return;
        
        let html = '';
        for (let i = 0; i < q.options.length; i++) {
            const prefix = (i === q.correct) ? '✓' : '✗';
            html += `<div class="option-analysis"><strong>${prefix} ${String.fromCharCode(65+i)}. ${q.options[i]}</strong><br>${analysis.options[i]}</div>`;
        }
        analysisContent.innerHTML = html;
        analysisContainer.classList.add('show');
    }

    function renderPalette() {
        paletteContainer.innerHTML = '';
        for (let i = 0; i < questions.length; i++) {
            const palItem = document.createElement('div');
            palItem.className = 'palette-item';
            palItem.textContent = i + 1;
            if (userAnswers[i] !== null && userAnswers[i] !== -1) {
                palItem.classList.add('answered');
            } else if (userAnswers[i] === -1) {
                palItem.classList.add('unanswered-timer');
            }
            if (i === currentIndex) palItem.classList.add('current');
            palItem.addEventListener('click', () => goToQuestion(i));
            paletteContainer.appendChild(palItem);
        }
    }

    function goToQuestion(index) {
        if (quizSubmitted) return;
        if (index < 0 || index >= questions.length) return;
        currentIndex = index;
        answerLock = false;
        renderCurrentQuestion();
        renderPalette();
        updateNavButtons();
        currentIdxDisplay.textContent = currentIndex + 1;
    }

    function nextQuestion() {
        if (quizSubmitted) return;
        if (currentIndex + 1 < questions.length) {
            currentIndex++;
            answerLock = false;
            renderCurrentQuestion();
            renderPalette();
            updateNavButtons();
            currentIdxDisplay.textContent = currentIndex + 1;
        }
    }

    function prevQuestion() {
        if (quizSubmitted) return;
        if (currentIndex > 0) {
            currentIndex--;
            answerLock = false;
            renderCurrentQuestion();
            renderPalette();
            updateNavButtons();
            currentIdxDisplay.textContent = currentIndex + 1;
        }
    }

    function updateNavButtons() {
        prevBtn.disabled = (currentIndex === 0);
        nextBtn.disabled = (currentIndex === questions.length - 1);
    }

    prevBtn.addEventListener('click', prevQuestion);
    nextBtn.addEventListener('click', nextQuestion);

    renderCurrentQuestion();
    renderPalette();
    updateNavButtons();
    currentIdxDisplay.textContent = 1;
</script>
</body>
</html>
