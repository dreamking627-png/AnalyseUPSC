<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AnalyseUPSC – Modern History (1750–1947)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        /* Header with home link */
        .header {
            background: #1e293b;
            color: white;
            padding: 20px 24px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .header h1 {
            font-size: 1.4rem;
        }

        .header p {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-top: 4px;
        }

        .home-link {
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 500;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .home-link:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        /* Quiz area */
        .quiz-area {
            padding: 24px;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.4;
            color: #0f172a;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            background: #f8fafc;
            border: 1px solid #cbd5e1;
            border-radius: 16px;
            padding: 12px 18px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            color: #0f172a;
        }

        .option:hover {
            background: #e2e8f0;
            transform: translateX(4px);
        }

        .option.correct-highlight {
            background: #bbf7d0;
            border-color: #15803d;
        }

        .option.wrong-highlight {
            background: #fee2e2;
            border-color: #b91c1c;
        }

        /* Analysis section */
        .analysis {
            margin-top: 20px;
            padding: 16px;
            background: #f1f5f9;
            border-radius: 16px;
            border-left: 4px solid #3b82f6;
            display: none;
        }

        .analysis.show {
            display: block;
        }

        .analysis h4 {
            margin-bottom: 12px;
            color: #1e293b;
            font-size: 1rem;
        }

        .analysis .option-analysis {
            margin: 10px 0;
            padding-left: 16px;
            border-left: 2px solid #cbd5e1;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Navigation */
        .navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
        }

        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        button:disabled {
            background: #94a3b8;
            cursor: not-allowed;
            transform: none;
        }

        /* Question Palette */
        .question-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 20px 0;
            background: #f1f5f9;
            padding: 12px;
            border-radius: 20px;
        }

        .palette-item {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .palette-item:hover {
            background: #cbd5e1;
        }

        .palette-item.current {
            background: #3b82f6;
            color: white;
            border-color: #3b82f6;
        }

        .palette-item.answered {
            background: #bbf7d0;
            border-color: #15803d;
        }

        /* Progress indicator */
        .progress {
            font-size: 0.85rem;
            color: #475569;
        }

        @media (max-width: 600px) {
            .container {
                margin: 0;
                border-radius: 20px;
            }
            .question-text {
                font-size: 1.1rem;
            }
            .palette-item {
                width: 32px;
                height: 32px;
                font-size: 0.8rem;
            }
            .header h1 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header with Home Link -->
    <div class="header">
        <div>
            <h1>📘 Modern History (1750–1947)</h1>
            <p>British Expansion & Administration | 12 PYQs with Detailed Analysis</p>
        </div>
        <a href="index.html" class="home-link">🏠 Back to Home</a>
    </div>

    <div class="quiz-area" id="quizArea">
        <div class="question-text" id="questionText">Loading...</div>
        <div class="options" id="optionsContainer"></div>
        <div class="analysis" id="analysisContainer">
            <h4>📖 Detailed Analysis</h4>
            <div id="analysisContent"></div>
        </div>
        <div class="question-palette" id="paletteContainer"></div>
        <div class="navigation">
            <div class="nav-buttons">
                <button id="prevBtn" disabled>← Previous</button>
                <button id="nextBtn">Next →</button>
            </div>
            <div class="progress">Question <span id="currentIdxDisplay">1</span> / <span id="totalQDisplay">12</span></div>
        </div>
    </div>
</div>

<script>
    // ========== SET 1: MODERN HISTORY (1750–1947) ==========
    // Complete with analysis for each option (30+ words each)
    const questions = [
        {
            id: 1,
            text: "Hooghly was used as a base for piracy in the Bay of Bengal by:",
            options: ["the Portuguese", "the French", "the Danish", "the British"],
            correct: 0,
            analysis: {
                options: [
                    "✓ The Portuguese established a trading post at Hooghly in 1537. By the late 16th century, they began indulging in piracy, attacking ships in the Bay of Bengal. Their presence angered the Mughal emperor Shah Jahan, who expelled them in 1632 after a siege. This episode is significant in understanding early European conflicts with Mughal authority.",
                    "✗ The French East India Company was established in 1664 and later set up a factory at Chandernagore near Hooghly. However, their activities in the Hooghly region were primarily commercial and diplomatic; there is no historical record of the French using Hooghly as a pirate base.",
                    "✗ The Danish East India Company had a small settlement at Serampore (Frederiksnagore) north of Calcutta from 1755. They were primarily traders and missionaries; piracy was not associated with their presence in Bengal.",
                    "✗ The British East India Company established its first factory in Bengal at Hooghly in 1651 but shifted to Calcutta (Sutanuti) in 1690. The British were more focused on trade and later political control; piracy was not a characteristic of their early Bengal operations."
                ]
            }
        },
        {
            id: 2,
            text: "The 'Modi script' was employed in the documents of the:",
            options: ["Wodeyars", "Zamorins", "Hovsalas", "Marathas"],
            correct: 3,
            analysis: {
                options: [
                    "✗ The Wodeyar dynasty ruled Mysore; they used Kannada and Persian scripts, not Modi.",
                    "✗ The Zamorins (Samoothiris) of Calicut used Malayalam scripts.",
                    "✗ The Hoysala dynasty (10th–14th century) used Kannada and Sanskrit inscriptions.",
                    "✓ Modi is a cursive script derived from Devanagari, used extensively by the Marathas for administrative and court records. It was developed during the 17th century and remained in use until the early 20th century. Shivaji's administration used Modi extensively."
                ]
            }
        },
        {
            id: 3,
            text: "Examine the map given below: The places marked 1, 2, 3 and 4 were respectively the seats of powers of the:",
            options: ["Scindias, Holkars, Gaekwads and Bhonsles", "Holkars, Scindias, Gaekwads and Bhonsles", "Gaekwads, Bhonsles, Scindias and Holkars", "Scindias, Holkars, Bhonsles and Gaekwads"],
            correct: 0,
            analysis: {
                options: [
                    "✓ This order corresponds to Gwalior (Scindias), Indore (Holkars), Baroda (Gaekwads), and Nagpur (Bhonsles). Historically, these were the major Maratha confederacy states.",
                    "✗ Indore (Holkars) and Gwalior (Scindias) are interchanged; the map likely placed Scindias at Gwalior first.",
                    "✗ Baroda (Gaekwads) and Nagpur (Bhonsles) appear first, which does not match the typical geographic order.",
                    "✗ This swaps Bhonsles and Gaekwads; historically Bhonsles were at Nagpur and Gaekwads at Baroda."
                ]
            }
        },
        {
            id: 4,
            text: "Which one of the following pairs is correctly matched?",
            options: ["Battle of Buxar—Mir Jafar vs. Clive", "Battle of Wandiwash—French vs. East India Company", "Battle of Chilianwala—Dalhousie vs. Marathas", "Battle of Kharda—Nizam vs. East India Company"],
            correct: 1,
            analysis: {
                options: [
                    "✗ Battle of Buxar (1764) was fought between the British (Hector Munro) and the combined forces of Mir Qasim, Shuja-ud-Daula, and Shah Alam II. Mir Jafar was not involved; he had been deposed.",
                    "✓ Battle of Wandiwash (1760) was fought between the French (Comte de Lally) and the British (Sir Eyre Coote). It was a decisive British victory that ended French ambitions in India.",
                    "✗ Battle of Chilianwala (1849) was part of the Second Anglo-Sikh War, fought between the British and the Sikh army under Sher Singh Attariwalla. Dalhousie was Governor-General but not a commander; Marathas were not involved.",
                    "✗ Battle of Kharda (1795) was fought between the Nizam of Hyderabad and the Marathas, not the British. The British did not participate."
                ]
            }
        },
        {
            id: 5,
            text: "Who among the following was the first European to initiate the policy of taking part in the quarrels of Indian princes with a view to acquire territories?",
            options: ["Clive", "Dupleix", "Albuquerque", "Warren Hastings"],
            correct: 1,
            analysis: {
                options: [
                    "✗ Clive (1725–1774) famously intervened in Bengal, leading to the Battle of Plassey (1757). However, the practice of intervening in Indian princely disputes to gain territory was pioneered earlier by the French.",
                    "✓ Joseph François Dupleix (1697–1763), the French Governor-General of Pondicherry, was the first European to systematically intervene in Indian princely quarrels. In the Carnatic Wars (1746–1763), he supported rival claimants to the thrones of Carnatic and Hyderabad to extend French influence and acquire territories.",
                    "✗ Afonso de Albuquerque (1453–1515), a Portuguese governor, conquered Goa and established Portuguese naval supremacy in the Indian Ocean. His approach was based on direct conquest, not intervention in succession disputes.",
                    "✗ Warren Hastings (1732–1818) was the first Governor-General of Bengal (1773–1785). He consolidated British power after Clive but followed policies already established."
                ]
            }
        },
        {
            id: 6,
            text: "Who among the following was associated with suppression of thugs?",
            options: ["General Henry Prendergast", "Captain Sleeman", "Alexander Burres", "Captain Robert Pemberton"],
            correct: 1,
            analysis: {
                options: [
                    "✗ General Prendergast served in India but is not specifically linked to thug suppression.",
                    "✓ William Henry Sleeman (1788–1856) was a British officer who led the campaign against the thuggee cult in the 1830s. He is credited with eradicating the organized thug network through intelligence, capture, and trials. His book 'Rambles and Recollections of an Indian Official' details his experiences.",
                    "✗ Not a historically prominent figure in thug suppression.",
                    "✗ Pemberton served in India but is not primarily associated with thug suppression."
                ]
            }
        },
        {
            id: 7,
            text: "The Governor-General who followed a spirited 'Forward' policy towards Afghanistan was:",
            options: ["Minto", "Dufferin", "Elgin", "Lytton"],
            correct: 3,
            analysis: {
                options: [
                    "✗ Lord Minto (1807–13) is known for the Charter Act of 1813 and limited engagement with Afghanistan.",
                    "✗ Lord Dufferin (1884–88) dealt with the Third Anglo-Burmese War and the aftermath of the Second Anglo-Afghan War but did not initiate the 'Forward' policy.",
                    "✗ Lord Elgin (1894–99) faced the Chitral campaign but the 'Forward' policy was earlier.",
                    "✓ Lord Lytton (1876–80) is known for his aggressive 'Forward' policy in Afghanistan, culminating in the Second Anglo-Afghan War (1878–80). He aimed to counter Russian influence and establish British pre‑eminence."
                ]
            }
        },
        {
            id: 8,
            text: "At a time when empires in Europe were crumbling before the might of Napoleon, which one of the following Governors-General kept the British flag flying high in India?",
            options: ["Warren Hastings", "Lord Cornwallis", "Lord Wellesley", "Lord Hastings"],
            correct: 2,
            analysis: {
                options: [
                    "✗ Warren Hastings (1773–85) served before Napoleon's rise.",
                    "✗ Lord Cornwallis (1786–93, 1805) was in India during the early phase of the Napoleonic Wars but was not the key figure in expanding British power during that period.",
                    "✓ Lord Wellesley (1798–1805) pursued an aggressive policy of expansion through the Subsidiary Alliance system. He was in India when Napoleon was at his peak in Europe, and he significantly extended British territory.",
                    "✗ Lord Hastings (1813–23) served after Napoleon's defeat."
                ]
            }
        },
        {
            id: 9,
            text: "The last major extension of British Indian territory took place during the time of:",
            options: ["Dufferin", "Dalhousie", "Lytton", "Curzon"],
            correct: 1,
            analysis: {
                options: [
                    "✗ Lord Dufferin (1884–88) oversaw the annexation of Upper Burma (1885) but that was not the last major extension.",
                    "✓ Lord Dalhousie (1848–56) implemented the Doctrine of Lapse, annexing Satara, Jhansi, Nagpur, and others, and also annexed Punjab (1849) and Lower Burma (1852). This was the last major territorial expansion before the Crown took over.",
                    "✗ Lord Lytton (1876–80) fought the Second Anglo-Afghan War, but no territorial annexation in India occurred under him.",
                    "✗ Lord Curzon (1899–1905) did not annex Indian territory; his focus was on administrative reforms, the partition of Bengal, and frontier management."
                ]
            }
        },
        {
            id: 10,
            text: "Who among the following Indian rulers established embassies in foreign countries on modern lines?",
            options: ["Haider Ali", "Mir Qasim", "Shah Alam II", "Tipu Sultan"],
            correct: 3,
            analysis: {
                options: [
                    "✗ Haider Ali (r. 1761–1782) of Mysore focused on military modernization but did not establish formal embassies.",
                    "✗ Mir Qasim (1760–1763), Nawab of Bengal, sought help from outside but did not create modern diplomatic missions.",
                    "✗ The Mughal emperor Shah Alam II (1760–1806) had a symbolic role but his authority was limited; no foreign embassies were established.",
                    "✓ Tipu Sultan (r. 1782–1799) of Mysore sent embassies to France, Turkey, Iran, and Afghanistan seeking alliances against the British. He used modern diplomatic channels, including correspondence with Napoleon, to garner support."
                ]
            }
        },
        {
            id: 11,
            text: "Which one of the following statements is not correct?",
            options: [
                "Ali Mardan Khan introduced the system of revenue farming in Bengal.",
                "Maharaja Ranjit Singh set up modern foundries to manufacture cannons at Lahore.",
                "Sawai Jai Singh of Amber had Euclid's Elements of Geometry translated into Sanskrit.",
                "Sultan Tipu of Mysore gave money for the construction of the idol of Goddess Sharda in the Shringeri temple."
            ],
            correct: 0,
            analysis: {
                options: [
                    "✗ This is the INCORRECT statement. Ali Mardan Khan was a Mughal governor who served under Shah Jahan; he was known for his work in Kashmir and canal building, not for introducing revenue farming in Bengal. Revenue farming (ijara) was prevalent in Bengal later, particularly after the British took over.",
                    "✓ Maharaja Ranjit Singh (1780–1839) modernized his army with French generals and established foundries at Lahore to produce cannons and muskets. (This statement is correct)",
                    "✓ Sawai Jai Singh (1688–1743) was a scholar-king who promoted astronomy and mathematics. He commissioned translations of Euclid's works into Sanskrit. (This statement is correct)",
                    "✓ Tipu Sultan, though a Muslim ruler, respected Hindu institutions and donated funds to the Sringeri temple after it was plundered by Marathas. (This statement is correct)"
                ]
            }
        },
        {
            id: 12,
            text: "Which one of the following is the correct statement?",
            options: [
                "The modern Kochi was a Dutch colony till India's independence.",
                "The Dutch defeated the Portuguese and built Fort Williams in the modern Kochi.",
                "The modern Kochi was first a Dutch colony before the Portuguese took over.",
                "The modern Kochi never became a part of a British colony."
            ],
            correct: 3,
            analysis: {
                options: [
                    "✗ Cochin (Kochi) was a Portuguese colony (1503–1663), then Dutch (1663–1795), then British (1795–1947). It was not a Dutch colony until independence; the Dutch left in 1795.",
                    "✗ The Dutch defeated the Portuguese in 1663 and took over the city, but Fort Williams is a British fort in Calcutta, not in Kochi.",
                    "✗ Portuguese were the first European power in Kochi (1503); they were followed by the Dutch.",
                    "✓ Kochi was under British control from 1795 but remained a princely state under British suzerainty, not directly administered as a colony. Hence this statement is considered correct."
                ]
            }
        }
    ];

    // ========== APP STATE ==========
    let currentIndex = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let answerLock = false;

    // DOM elements
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const analysisContainer = document.getElementById('analysisContainer');
    const analysisContent = document.getElementById('analysisContent');
    const paletteContainer = document.getElementById('paletteContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const currentIdxDisplay = document.getElementById('currentIdxDisplay');
    const totalQDisplay = document.getElementById('totalQDisplay');

    // Set total questions
    totalQDisplay.textContent = questions.length;

    // Render current question
    function renderCurrentQuestion() {
        const q = questions[currentIndex];
        questionText.textContent = q.text;
        
        // Build options
        optionsContainer.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const optDiv = document.createElement('div');
            optDiv.className = 'option';
            optDiv.textContent = `${String.fromCharCode(65+idx)}. ${opt}`;
            optDiv.setAttribute('data-idx', idx);
            optDiv.addEventListener('click', () => handleOptionClick(idx));
            optionsContainer.appendChild(optDiv);
        });
        
        // If already answered, apply highlights and show analysis
        if (userAnswers[currentIndex] !== null) {
            const selectedIdx = userAnswers[currentIndex];
            const correctIdx = q.correct;
            const optionDivs = document.querySelectorAll('.option');
            // Highlight correct (green)
            optionDivs[correctIdx].classList.add('correct-highlight');
            // If wrong, highlight selected (red)
            if (selectedIdx !== correctIdx) {
                optionDivs[selectedIdx].classList.add('wrong-highlight');
            }
            // Show analysis
            showAnalysis(q, selectedIdx);
        } else {
            // Clear any previous highlights
            document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct-highlight', 'wrong-highlight'));
            analysisContainer.classList.remove('show');
        }
    }

    function handleOptionClick(selectedIdx) {
        if (answerLock) return;
        if (userAnswers[currentIndex] !== null) return;
        
        const q = questions[currentIndex];
        const correctIdx = q.correct;
        
        // Store answer
        userAnswers[currentIndex] = selectedIdx;
        
        // Apply highlights
        const optionDivs = document.querySelectorAll('.option');
        optionDivs[correctIdx].classList.add('correct-highlight');
        if (selectedIdx !== correctIdx) {
            optionDivs[selectedIdx].classList.add('wrong-highlight');
        }
        
        // Show analysis
        showAnalysis(q, selectedIdx);
        
        // Update palette
        renderPalette();
        answerLock = true;
        // Note: No auto-advance; user must click Next
    }

    function showAnalysis(q, selectedIdx) {
        const analysis = q.analysis;
        if (!analysis || !analysis.options) return;
        
        let html = '';
        for (let i = 0; i < q.options.length; i++) {
            const prefix = (i === q.correct) ? '✓' : '✗';
            html += `<div class="option-analysis"><strong>${prefix} ${String.fromCharCode(65+i)}. ${q.options[i]}</strong><br>${analysis.options[i]}</div>`;
        }
        analysisContent.innerHTML = html;
        analysisContainer.classList.add('show');
    }

    function renderPalette() {
        paletteContainer.innerHTML = '';
        for (let i = 0; i < questions.length; i++) {
            const palItem = document.createElement('div');
            palItem.className = 'palette-item';
            palItem.textContent = i + 1;
            if (userAnswers[i] !== null) palItem.classList.add('answered');
            if (i === currentIndex) palItem.classList.add('current');
            palItem.addEventListener('click', () => goToQuestion(i));
            paletteContainer.appendChild(palItem);
        }
    }

    function goToQuestion(index) {
        if (index < 0 || index >= questions.length) return;
        currentIndex = index;
        answerLock = false;
        renderCurrentQuestion();
        renderPalette();
        updateNavButtons();
        currentIdxDisplay.textContent = currentIndex + 1;
    }

    function nextQuestion() {
        if (currentIndex + 1 < questions.length) {
            currentIndex++;
            answerLock = false;
            renderCurrentQuestion();
            renderPalette();
            updateNavButtons();
            currentIdxDisplay.textContent = currentIndex + 1;
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            answerLock = false;
            renderCurrentQuestion();
            renderPalette();
            updateNavButtons();
            currentIdxDisplay.textContent = currentIndex + 1;
        }
    }

    function updateNavButtons() {
        prevBtn.disabled = (currentIndex === 0);
        nextBtn.disabled = (currentIndex === questions.length - 1);
    }

    // Event listeners
    prevBtn.addEventListener('click', prevQuestion);
    nextBtn.addEventListener('click', nextQuestion);

    // Initial render
    renderCurrentQuestion();
    renderPalette();
    updateNavButtons();
    currentIdxDisplay.textContent = 1;
</script>
</body>
</html>
